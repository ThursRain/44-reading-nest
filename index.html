<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>44小窝共读</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%236f5148'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-size='25' fill='white' font-family='Arial'%3E44%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light;
      --paper: #fbf5ed;
      --paper-deep: #f4eadf;
      --ink: #3f3531;
      --muted: #8d7f79;
      --brown: #6f5148;
      --brown-soft: #8a6a60;
      --pink: #efc8bf;
      --green: #dce9dc;
      --line: rgba(111, 81, 72, 0.16);
      --shadow: 0 18px 46px rgba(88, 62, 48, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; min-height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(circle at 20% 8%, rgba(255,255,255,.72), transparent 28rem),
        linear-gradient(180deg, var(--paper), #fffaf4);
      color: var(--ink);
      overflow-x: hidden;
    }
    button, input, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 18px;
      background: #fffaf5;
      color: var(--ink);
      min-height: 44px;
      padding: 0 16px;
      box-shadow: inset 0 0 0 1px var(--line);
    }
    button:active { transform: translateY(1px); }
    .app-shell { width: min(920px, 100%); margin: 0 auto; padding: 36px 24px 90px; }
    .brand-mark {
      width: 74px; height: 74px; border-radius: 22px; display: grid; place-items: center;
      background: var(--brown); color: #fff; font-weight: 800; font-size: 26px; box-shadow: var(--shadow);
    }
    .home-head { display: grid; gap: 14px; margin-bottom: 28px; }
    h1 { margin: 0; font-size: clamp(38px, 9vw, 58px); letter-spacing: 0; line-height: 1.08; }
    .subtitle { margin: 0; color: var(--muted); font-weight: 700; font-size: 18px; }
    .choice-grid { display: grid; gap: 18px; margin: 28px 0 34px; }
    .choice {
      display: grid; grid-template-columns: 72px 1fr 28px; align-items: center; gap: 18px;
      min-height: 130px; padding: 24px 26px; border-radius: 26px; box-shadow: var(--shadow);
    }
    .choice.novel { background: var(--pink); }
    .choice.comic { background: var(--green); }
    .choice .emoji { font-size: 38px; }
    .choice strong { display: block; font-size: 28px; margin-bottom: 7px; }
    .choice span { color: #76655f; font-weight: 700; }
    .choice .arrow { font-size: 34px; font-weight: 700; color: var(--brown); }
    .shelf-head { display: flex; justify-content: space-between; align-items: end; margin: 18px 0 14px; }
    .shelf-head h2 { margin: 0; font-size: 30px; }
    .shelf-head span { color: var(--muted); font-weight: 800; }
    .filters { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 14px; }
    .pill { white-space: nowrap; border-radius: 999px; font-weight: 800; background: #fffdf9; }
    .pill.active { background: var(--brown); color: white; box-shadow: none; }
    .empty {
      border: 2px dashed rgba(111, 81, 72, .16); border-radius: 22px; padding: 34px 20px;
      text-align: center; color: var(--muted); font-size: 18px; font-weight: 700;
    }
    .book-list { display: grid; gap: 14px; }
    .book-card {
      display: grid; gap: 12px; padding: 18px; border-radius: 22px;
      background: rgba(255,255,255,.72); box-shadow: inset 0 0 0 1px var(--line);
    }
    .book-card-top { display: grid; grid-template-columns: 48px 1fr auto; gap: 12px; align-items: center; }
    .book-spine { width: 48px; height: 58px; border-radius: 12px; display: grid; place-items: center; color: #fff; font-weight: 900; background: var(--brown); }
    .book-spine.comic { background: #779179; }
    .book-title strong { display: block; font-size: 20px; }
    .book-title span, .book-progress { color: var(--muted); font-weight: 700; }
    .book-progress { display: grid; gap: 4px; font-size: 14px; }
    .book-actions { display: flex; gap: 10px; }
    .primary { background: var(--brown); color: #fff; box-shadow: none; font-weight: 900; }
    .danger { color: #9b3b32; }
    .import-view, .reader-view { min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 4; display: grid; grid-template-columns: 48px 1fr 48px; gap: 10px;
      align-items: center; padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      background: rgba(251, 245, 237, .92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line);
    }
    .topbar strong { text-align: center; font-size: 18px; }
    .topbar small { display: block; text-align: center; color: var(--muted); font-weight: 700; margin-top: 2px; }
    .icon-button { width: 44px; padding: 0; border-radius: 50%; font-size: 22px; }
    .form-card { display: grid; gap: 14px; background: rgba(255,255,255,.72); border-radius: 24px; padding: 18px; box-shadow: inset 0 0 0 1px var(--line); }
    .form-card label { display: grid; gap: 8px; color: var(--muted); font-weight: 800; }
    input[type="text"], textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 16px; background: #fffdf9;
      padding: 14px; color: var(--ink); outline: none;
    }
    textarea { min-height: 220px; resize: vertical; line-height: 1.65; }
    input[type="file"] { width: 100%; }
    .helper { margin: 0; color: var(--muted); line-height: 1.65; }
    .reader-view { background: linear-gradient(180deg, #f7eee4, #fcf6ee); }
    .reader-scroll {
      width: 100%; max-width: 760px; margin: 0 auto; padding: 22px 22px 160px;
      overflow-x: hidden;
    }
    .novel-paper {
      width: 100%; max-width: 690px; margin: 0 auto; padding: 12px 0 6px;
      font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      color: #38302d; font-size: clamp(20px, 5.5vw, 23px); line-height: 1.88;
      letter-spacing: 0; overflow-wrap: anywhere;
    }
    .novel-paper p { margin: 0 0 1.1em; }
    .comic-page { display: grid; gap: 16px; place-items: center; }
    .comic-page img { max-width: 100%; border-radius: 14px; box-shadow: var(--shadow); background: #fff; }
    .progress-panel {
      width: 100%; max-width: 690px; margin: 28px auto 0; padding: 16px;
      border-radius: 20px; background: rgba(255,255,255,.58); box-shadow: inset 0 0 0 1px var(--line);
    }
    .progress-readout { display: flex; justify-content: space-between; color: var(--muted); font-weight: 800; margin-bottom: 8px; }
    .slider { width: 100%; accent-color: var(--brown); min-height: 32px; }
    .page-buttons { width: 100%; max-width: 690px; margin: 14px auto 0; display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
    .page-buttons span { color: var(--muted); font-weight: 800; }
    .bottom-actions {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 5; display: grid; gap: 10px;
      grid-template-columns: 1fr 1fr; padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
      background: rgba(251, 245, 237, .92); backdrop-filter: blur(18px); border-top: 1px solid var(--line);
    }
    .bottom-actions .wide { grid-column: 1 / -1; }
    .companion {
      width: 100%; max-width: 690px; margin: 18px auto 0; border-radius: 20px;
      background: rgba(255,255,255,.6); box-shadow: inset 0 0 0 1px var(--line); overflow: hidden;
    }
    .companion summary { cursor: pointer; padding: 14px 16px; font-weight: 900; }
    .companion-body { padding: 0 16px 16px; color: var(--muted); line-height: 1.65; }
    .notice { color: #9b5a35; font-weight: 800; }
    .toast {
      position: fixed; left: 18px; right: 18px; bottom: 92px; z-index: 8;
      background: var(--brown); color: white; padding: 12px 16px; border-radius: 18px;
      text-align: center; font-weight: 800; box-shadow: var(--shadow);
    }
    .hidden { display: none !important; }
    @media (min-width: 760px) {
      .choice-grid { grid-template-columns: 1fr 1fr; }
      .bottom-actions { left: 50%; transform: translateX(-50%); width: min(760px, 100%); border-radius: 24px 24px 0 0; }
    }
    @media (max-width: 768px) {
      .app-shell { padding: 34px 20px 92px; }
      .reader-scroll { max-width: 100%; padding-left: 20px; padding-right: 20px; box-sizing: border-box; }
      .novel-paper, .progress-panel, .page-buttons { max-width: 100%; }
      .choice { grid-template-columns: 58px 1fr 20px; padding: 22px 18px; }
      .choice strong { font-size: 25px; }
      body { width: 100%; max-width: 100%; overflow-x: hidden; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const DB_NAME = "44-reading-nest";
    const DB_VERSION = 1;
    const STORE = "books";
    const state = { books: [], screen: "home", filter: "all", book: null, draftPercent: 0, toast: "" };
    const $ = (sel) => document.querySelector(sel);
    const app = document.getElementById("app");

    function openDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "bookId" });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function readBooks() {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction(STORE, "readonly").objectStore(STORE).getAll();
        request.onsuccess = () => { db.close(); resolve(request.result || []); };
        request.onerror = () => { db.close(); reject(request.error); };
      });
    }

    async function saveBook(book) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(book);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    async function deleteBook(bookId) {
      const db = await openDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).delete(bookId);
        tx.oncomplete = () => { db.close(); resolve(); };
        tx.onerror = () => { db.close(); reject(tx.error); };
      });
    }

    async function stableId(parts) {
      const text = parts.join("|");
      if (!crypto.subtle) return "book-" + btoa(unescape(encodeURIComponent(text))).replace(/[^a-z0-9]/gi, "").slice(0, 32);
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return "book-" + Array.from(new Uint8Array(hash)).map((n) => n.toString(16).padStart(2, "0")).join("").slice(0, 32);
    }

    function segmentText(text) {
      const normalized = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
      const raw = normalized.split(/\n\s*\n+/).map((x) => x.trim()).filter(Boolean);
      const source = raw.length ? raw : normalized.split(/\n+/).map((x) => x.trim()).filter(Boolean);
      const segments = [];
      for (const block of source) {
        if (block.length <= 900) {
          segments.push(block);
        } else {
          for (let i = 0; i < block.length; i += 700) segments.push(block.slice(i, i + 700));
        }
      }
      return segments.length ? segments : ["这本书暂时没有读到正文。"];
    }

    function progressFor(index, total) {
      const safeTotal = Math.max(1, total);
      const safeIndex = Math.min(safeTotal, Math.max(1, index));
      return Math.round((safeIndex / safeTotal) * 100);
    }

    function updateBookProgress(book, index) {
      const total = book.totalSegments;
      const current = Math.min(total, Math.max(1, index));
      const now = new Date().toISOString();
      book.updatedAt = now;
      book.readingProgress = {
        bookId: book.bookId,
        currentSegmentIndex: current,
        totalSegments: total,
        progressPercent: progressFor(current, total),
        updatedAt: now
      };
      return book;
    }

    function showToast(message) {
      state.toast = message;
      render();
      setTimeout(() => {
        if (state.toast === message) {
          state.toast = "";
          render();
        }
      }, 1800);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (s) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
    }

    function homeView() {
      const books = state.books
        .filter((book) => state.filter === "all" || book.type === state.filter || (state.filter === "reading" && book.readingProgress.currentSegmentIndex < book.totalSegments) || (state.filter === "done" && book.readingProgress.currentSegmentIndex >= book.totalSegments))
        .sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
      return `
        <main class="app-shell">
          <section class="home-head">
            <div class="brand-mark">44</div>
            <h1>44小窝共读</h1>
            <p class="subtitle">晚上好，今天想一起看什么？</p>
          </section>
          <section class="choice-grid">
            <button class="choice novel" data-action="import-novel">
              <span class="emoji">📖</span><span><strong>小说共读</strong><span>导入 TXT / Markdown，慢慢读</span></span><span class="arrow">›</span>
            </button>
            <button class="choice comic" data-action="import-comic">
              <span class="emoji">🖼️</span><span><strong>漫画共读</strong><span>导入图片，一页页看</span></span><span class="arrow">›</span>
            </button>
          </section>
          <section class="shelf-head">
            <h2>我的书架</h2><span>${state.books.length} 本作品</span>
          </section>
          <nav class="filters">
            ${filterButton("all", "全部")}
            ${filterButton("reading", "阅读中")}
            ${filterButton("done", "已完成")}
            ${filterButton("novel", "小说")}
            ${filterButton("comic", "漫画")}
          </nav>
          <section class="book-list">
            ${books.length ? books.map(bookCard).join("") : `<div class="empty">小窝还是空的。选一本故事，我们一起开始吧。</div>`}
          </section>
        </main>
      `;
    }

    function filterButton(value, label) {
      return `<button class="pill ${state.filter === value ? "active" : ""}" data-filter="${value}">${label}</button>`;
    }

    function bookCard(book) {
      const p = book.readingProgress;
      const unit = book.type === "comic" ? "页" : "段";
      return `
        <article class="book-card">
          <div class="book-card-top">
            <span class="book-spine ${book.type}">${book.type === "comic" ? "画" : "书"}</span>
            <div class="book-title">
              <strong>${escapeHtml(book.title)}</strong>
              <span>${book.type === "comic" ? "漫画" : "小说"} · ${p.currentSegmentIndex >= p.totalSegments ? "已完成" : "阅读中"}</span>
            </div>
            <span>${p.progressPercent}%</span>
          </div>
          <div class="book-progress">
            <span>用户读到：第 ${p.currentSegmentIndex} ${unit} / 共 ${p.totalSegments} ${unit} · ${p.progressPercent}%</span>
            <span>婼婷：尚未同步</span>
          </div>
          <div class="book-actions">
            <button class="primary" data-open="${book.bookId}">继续阅读</button>
            <button data-delete="${book.bookId}" class="danger">删除</button>
          </div>
        </article>
      `;
    }

    function importView(type) {
      return `
        <main class="import-view">
          ${topbar(type === "comic" ? "漫画共读" : "小说共读", "准备好内容，我们就一起开始。")}
          <section class="app-shell">
            <div class="form-card">
              <label>作品名<input id="titleInput" type="text" placeholder="不填会自动用文件名" /></label>
              ${type === "novel" ? `
                <label>上传 TXT / Markdown<input id="fileInput" type="file" accept=".txt,.md,.markdown,text/plain,text/markdown" /></label>
                <label>或直接粘贴正文<textarea id="textInput" placeholder="把小说正文粘进来，也可以直接导入文件。"></textarea></label>
              ` : `
                <label>导入漫画图片<input id="fileInput" type="file" accept="image/*" multiple /></label>
                <p class="helper">图片会保存在当前浏览器里，刷新后仍能继续看。</p>
              `}
              <button class="primary" data-create="${type}">进入阅读小窝</button>
              <p class="helper">本版会把作品正文、分段和进度保存在 IndexedDB。清除 Safari 网站数据后，本机书架会被清空。</p>
            </div>
          </section>
        </main>
      `;
    }

    function topbar(title, sub) {
      return `<header class="topbar"><button class="icon-button" data-back>‹</button><div><strong>${escapeHtml(title)}</strong><small>${escapeHtml(sub || "")}</small></div><button class="icon-button" data-home>⌂</button></header>`;
    }

    function readerView() {
      const book = state.book;
      if (!book) return homeView();
      const p = book.readingProgress;
      const total = book.totalSegments;
      const index = Math.min(total, Math.max(1, p.currentSegmentIndex));
      const percent = progressFor(index, total);
      const unit = book.type === "comic" ? "页" : "段";
      const content = book.type === "comic"
        ? `<div class="comic-page"><img src="${book.segments[index - 1]}" alt="第 ${index} 页" /></div>`
        : `<article class="novel-paper">${escapeHtml(book.segments[index - 1] || "").split("\n").map((line) => `<p>${line || " "}</p>`).join("")}</article>`;
      return `
        <main class="reader-view">
          ${topbar(book.title, `第 ${index} ${unit} / 共 ${total} ${unit}`)}
          <section class="reader-scroll">
            ${content}
            <section class="progress-panel" aria-label="阅读进度">
              <div class="progress-readout"><span>第 <b id="draftIndex">${index}</b> ${unit} / 共 ${total} ${unit}</span><span><b id="draftPercent">${percent}</b>%</span></div>
              <input class="slider" id="progressSlider" type="range" min="0" max="100" step="1" value="${percent}" aria-label="阅读进度滑条" />
            </section>
            <div class="page-buttons">
              <button data-prev ${index <= 1 ? "disabled" : ""}>上一${unit}</button>
              <span>${index} / ${total}</span>
              <button data-next ${index >= total ? "disabled" : ""}>下一${unit}</button>
            </div>
            <details class="companion" id="companionDock">
              <summary>婼婷陪读</summary>
              <div class="companion-body" id="companionBody">婼婷还没留下短评。</div>
            </details>
          </section>
          <nav class="bottom-actions">
            <button data-look>陪我看看这里</button>
            <button data-today>今天看到这里</button>
            <button class="wide primary" data-home>回到书架</button>
          </nav>
        </main>
      `;
    }

    function render() {
      app.innerHTML =
        state.screen === "import-novel" ? importView("novel") :
        state.screen === "import-comic" ? importView("comic") :
        state.screen === "reader" ? readerView() :
        homeView();
      if (state.toast) app.insertAdjacentHTML("beforeend", `<div class="toast">${escapeHtml(state.toast)}</div>`);
      wireEvents();
    }

    function wireEvents() {
      document.querySelectorAll("[data-action='import-novel']").forEach((el) => el.onclick = () => { state.screen = "import-novel"; render(); });
      document.querySelectorAll("[data-action='import-comic']").forEach((el) => el.onclick = () => { state.screen = "import-comic"; render(); });
      document.querySelectorAll("[data-filter]").forEach((el) => el.onclick = () => { state.filter = el.dataset.filter; render(); });
      document.querySelectorAll("[data-back], [data-home]").forEach((el) => el.onclick = () => {
        localStorage.removeItem("44-reading-nest:lastBookId");
        state.book = null;
        state.screen = "home";
        render();
      });
      document.querySelectorAll("[data-open]").forEach((el) => el.onclick = () => openBook(el.dataset.open));
      document.querySelectorAll("[data-delete]").forEach((el) => el.onclick = () => removeBook(el.dataset.delete));
      document.querySelectorAll("[data-create]").forEach((el) => el.onclick = () => createBook(el.dataset.create));
      const slider = $("#progressSlider");
      if (slider && state.book) {
        slider.oninput = () => updateDraft(slider.value);
        slider.onchange = () => jumpToPercent(slider.value);
        slider.onpointerup = () => jumpToPercent(slider.value);
      }
      const prev = $("[data-prev]");
      const next = $("[data-next]");
      const today = $("[data-today]");
      const look = $("[data-look]");
      if (prev) prev.onclick = () => moveBy(-1);
      if (next) next.onclick = () => moveBy(1);
      if (today) today.onclick = () => saveToday();
      if (look) look.onclick = () => lookHere(look);
    }

    async function createBook(type) {
      try {
        const titleInput = $("#titleInput");
        const files = Array.from($("#fileInput")?.files || []);
        const now = new Date().toISOString();
        let title = titleInput.value.trim();
        let segments = [];
        if (type === "novel") {
          let text = $("#textInput").value.trim();
          if (files[0]) {
            text = await files[0].text();
            if (!title) title = files[0].name.replace(/\.(txt|md|markdown)$/i, "");
          }
          if (!text.trim()) return showToast("先导入或粘贴正文。");
          segments = segmentText(text);
          const bookId = await stableId([type, title || "未命名小说", text.length, text.slice(0, 200)]);
          await storeNewBook({ bookId, title: title || "未命名小说", type, segments, now });
        } else {
          if (!files.length) return showToast("先选择漫画图片。");
          if (!title) title = files[0].name.replace(/\.[^.]+$/i, "") || "未命名漫画";
          segments = await Promise.all(files.map(fileToDataUrl));
          const bookId = await stableId([type, title, files.length, files.map((f) => `${f.name}:${f.size}:${f.lastModified}`).join(",")]);
          await storeNewBook({ bookId, title, type, segments, now });
        }
      } catch (error) {
        console.error("Import failed", error);
        showToast("导入失败，请换个文件再试。");
      }
    }

    async function storeNewBook({ bookId, title, type, segments, now }) {
      const book = updateBookProgress({
        bookId,
        title,
        type,
        segments,
        chapters: segments,
        totalSegments: segments.length,
        createdAt: now,
        updatedAt: now,
        readingProgress: { bookId, currentSegmentIndex: 1, totalSegments: segments.length, progressPercent: 1, updatedAt: now }
      }, 1);
      await saveBook(book);
      state.books = [book, ...state.books.filter((item) => item.bookId !== book.bookId)];
      state.book = book;
      localStorage.setItem("44-reading-nest:lastBookId", book.bookId);
      state.screen = "reader";
      render();
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function openBook(bookId) {
      const book = state.books.find((item) => item.bookId === bookId);
      if (!book) return;
      state.book = book;
      localStorage.setItem("44-reading-nest:lastBookId", book.bookId);
      state.screen = "reader";
      render();
    }

    async function removeBook(bookId) {
      if (!confirm("确定从小窝删除这本书吗？")) return;
      await deleteBook(bookId);
      state.books = state.books.filter((item) => item.bookId !== bookId);
      if (state.book?.bookId === bookId) state.book = null;
      state.screen = "home";
      render();
    }

    function percentToIndex(percent, total) {
      if (total <= 1) return 1;
      return Math.min(total, Math.max(1, Math.round((Number(percent) / 100) * (total - 1)) + 1));
    }

    function updateDraft(percent) {
      const total = state.book.totalSegments;
      const index = percentToIndex(percent, total);
      $("#draftIndex").textContent = index;
      $("#draftPercent").textContent = progressFor(index, total);
    }

    async function jumpToPercent(percent) {
      await setPosition(percentToIndex(percent, state.book.totalSegments));
    }

    async function moveBy(delta) {
      await setPosition(state.book.readingProgress.currentSegmentIndex + delta);
    }

    async function setPosition(index) {
      updateBookProgress(state.book, index);
      await saveBook(state.book);
      localStorage.setItem("44-reading-nest:lastBookId", state.book.bookId);
      state.books = state.books.map((book) => book.bookId === state.book.bookId ? state.book : book);
      render();
      window.scrollTo(0, 0);
    }

    async function saveToday() {
      await saveBook(state.book);
      state.books = state.books.map((book) => book.bookId === state.book.bookId ? state.book : book);
      showToast(`今天看到第 ${state.book.readingProgress.currentSegmentIndex} ${state.book.type === "comic" ? "页" : "段"}，下次继续。`);
    }

    function lookHere(button) {
      const body = $("#companionBody");
      const dock = $("#companionDock");
      button.disabled = true;
      button.textContent = "正在陪你看这里…";
      if (dock) dock.open = true;
      if (body) body.textContent = "正在陪你看这里……";
      setTimeout(() => {
        const message = "AI 陪读暂不可用，请检查 API / MCP 配置。";
        console.error("Companion unavailable: no API/MCP host configured.");
        if (body) body.innerHTML = `<p class="notice">${message}</p><p>这版网页已经不会静默失败；等接入 API 或 MCP 后，婼婷就能在这里回复。</p>`;
        button.disabled = false;
        button.textContent = "陪我看看这里";
      }, 420);
    }

    async function init() {
      try {
        state.books = await readBooks();
        const lastBookId = localStorage.getItem("44-reading-nest:lastBookId");
        const lastBook = state.books.find((book) => book.bookId === lastBookId);
        if (lastBook) {
          state.book = lastBook;
          state.screen = "reader";
        }
      } catch (error) {
        console.error("Bookshelf restore failed", error);
        state.toast = "本地书架读取失败，请检查浏览器存储权限。";
      }
      render();
    }
    init();
  </script>
</body>
</html>
